                            <span className="badge badge-info uppercase text-[9px]">{emp.role}</span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* View Tree Chart */}
            {viewTab === 'tree' && (
              <div className="card p-6 overflow-x-auto min-w-[700px]">
                <h3 className="font-bold text-white text-base mb-6 flex items-center gap-2"><Icon name="Building2" className="text-brand" /> Cấu trúc sơ đồ tổ chức</h3>
                
                <div className="flex flex-col items-center gap-8 py-4">
                  {/* CEO Level */}
                  <div className="text-center">
                    <div className="p-4 rounded-2xl bg-gradient-to-br from-purple-600/30 to-indigo-600/30 border border-purple-500/40 w-56 mx-auto shadow-glow shadow-purple-500/10">
                      <p className="text-[10px] font-bold text-purple-300 uppercase tracking-widest">{orgTree.name}</p>
                      <p className="text-sm font-bold text-white mt-1">{orgTree.head?.full_name}</p>
                      <p className="text-[11px] text-slate-500">{orgTree.head?.position}</p>
                    </div>
                  </div>

                  {/* Vertical Line */}
                  <div className="w-0.5 h-6 bg-slate-700 -mt-8" />

                  {/* Departments grid level */}
                  <div className="grid grid-cols-3 gap-8 relative">
                    <div className="absolute top-0 left-1/6 right-1/6 h-0.5 bg-slate-700 -translate-y-4" style={{ left: '16.66%', right: '16.66%' }} />
                    
                    {orgTree.children.map((dep, idx) => (
                      <div key={idx} className="flex flex-col items-center gap-4">
                        {/* Connecting line */}
                        <div className="w-0.5 h-4 bg-slate-700 -mt-4" />
                        
                        <div className="p-4 rounded-xl bg-surface-elevated/40 border border-surface-border w-52 text-center">
                          <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{dep.name}</p>
                          <p className="text-xs font-bold text-white mt-1">{dep.head?.full_name || 'Đang tuyển'}</p>
                          <p className="text-[10px] text-slate-500">{dep.head?.position || 'Trưởng phòng'}</p>
                        </div>

                        {/* Child staff level */}
                        {dep.children.length > 0 && (
                          <div className="flex flex-col items-center gap-3">
                            <div className="w-0.5 h-4 bg-slate-700" />
                            <div className="flex flex-wrap gap-2 justify-center max-w-[220px]">
                              {dep.children.map((child, cIdx) => (
                                <div key={cIdx} className="p-2.5 rounded-lg bg-surface-elevated/20 border border-surface-border/50 text-center w-40 text-xs">
                                  <p className="font-bold text-slate-200">{child.head?.full_name}</p>
                                  <p className="text-[10px] text-slate-500">{child.head?.position}</p>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* Modal: Add Employee */}
            {showAddModal && (
              <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="glass-card w-full max-w-md p-6">
                  <div className="flex justify-between items-center mb-4">
                    <h4 className="font-bold text-white flex items-center gap-2"><Icon name="UserCheck" className="text-brand" /> Thêm nhân viên mới</h4>
                    <button onClick={() => setShowAddModal(false)} className="btn-ghost p-1 rounded-lg"><Icon name="X" /></button>
                  </div>
                  <form onSubmit={handleAdd} className="space-y-4">
                    <div>
                      <label className="label">Họ và tên *</label>
                      <input type="text" value={form.full_name} onChange={e => setForm({...form, full_name: e.target.value})} className="input" required placeholder="Nguyễn Văn A" />
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="label">Email *</label>
                        <input type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} className="input" required placeholder="nva@goclick.vn" />
                      </div>
                      <div>
                        <label className="label">Mức lương cơ bản</label>
                        <input type="number" value={form.base_salary} onChange={e => setForm({...form, base_salary: Number(e.target.value)})} className="input" required />
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="label">Phòng ban</label>
                        <select value={form.department} onChange={e => setForm({...form, department: e.target.value})} className="input">
                          <option>Ban Giám Đốc</option>
                          <option>Phòng Nhân Sự</option>
                          <option>Phòng Marketing</option>
                          <option>Phòng Kế Toán</option>
                        </select>
                      </div>
                      <div>
                        <label className="label">Vị trí công việc</label>
                        <input type="text" value={form.position} onChange={e => setForm({...form, position: e.target.value})} className="input" placeholder="Content Creator" />
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="label">Vai trò RBAC</label>
                        <select value={form.role} onChange={e => setForm({...form, role: e.target.value})} className="input">
                          <option value="employee">Nhân viên</option>
                          <option value="hr">Nhân sự (HR)</option>
                          <option value="affiliate_manager">Affiliate Manager</option>
                          <option value="accountant">Kế toán</option>
                        </select>
                      </div>
                      <div>
                        <label className="label">Ngày nhận việc</label>
                        <input type="date" value={form.hire_date} onChange={e => setForm({...form, hire_date: e.target.value})} className="input" required />
                      </div>
                    </div>
                    <div className="flex gap-3 pt-2">
                      <button type="button" onClick={() => setShowAddModal(false)} className="btn btn-secondary flex-1 justify-center">Hủy</button>
                      <button type="submit" className="btn btn-primary flex-1 justify-center">Lưu hồ sơ</button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      };

      // AFFILIATE MANAGEMENT PAGE
      const AffiliatePage = ({ user }) => {
        const [activeTab, setActiveTab] = useState('list'); // list | commission | postback
        const [affiliates, setAffiliates] = useState(() => db.get("affiliates") || []);
        const [postbackLogs, setPostbackLogs] = useState(() => db.get("postback_logs") || []);
        const [config, setConfig] = useState(() => db.get("commission_config") || []);
        const [workflows, setWorkflows] = useState(() => db.get("workflows") || []);

        const [showAddAffModal, setShowAddAffModal] = useState(false);
        const [affForm, setAffForm] = useState({ full_name: '', email: '', phone: '', traffic_source: 'SEO / Blog', tier_level: 1 });
        const [search, setSearch] = useState('');
        const [statusFilter, setStatusFilter] = useState('');

        const [editConfig, setEditConfig] = useState(null);
        const [editRate, setEditRate] = useState('');

        const [calcResult, setCalcResult] = useState(null);
        const [calcLoading, setCalcLoading] = useState(false);

        // Sorting
        const [sortField, setSortField] = useState('total_revenue');
        const [sortDir, setSortDir] = useState('desc');

        const handleAddAff = (e) => {
          e.preventDefault();
          const newAff = {
            id: `aff-00${affiliates.length + 1}`,
            affiliate_code: `AF00${affiliates.length + 1}`,
            ...affForm,
            status: "active",
            manager_id: user.id,
            manager_name: user.full_name,
            total_clicks: 0,
            total_conversions: 0,
            total_revenue: 0,
            total_commission: 0,
            joined_at: new Date().toISOString().slice(0, 10)
          };
          const updated = [...affiliates, newAff];
          setAffiliates(updated);
          db.set("affiliates", updated);
          setShowAddAffModal(false);
          setAffForm({ full_name: '', email: '', phone: '', traffic_source: 'SEO / Blog', tier_level: 1 });
        };

        const handleSaveConfig = (tier) => {
          const updated = config.map(c => c.tier_level === tier ? { ...c, rate_percent: parseFloat(editRate) } : c);
          setConfig(updated);
          db.set("commission_config", updated);
          setEditConfig(null);
        };

        const runCommissionCalculation = () => {
          setCalcLoading(true);
          setTimeout(() => {
            const now = new Date();
            const fromDate = `${now.getFullYear()}-${String(now.getMonth()).padStart(2, '0')}-01`;
            const toDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;

            // Compute calculations
            const payouts = affiliates.filter(a => a.status === 'active').map(aff => {
              // Rate config
              const rateCfg = config.find(c => c.tier_level === aff.tier_level) || { rate_percent: 5 };
              const rate = rateCfg.rate_percent;

              // We calculate direct commission based on simulated conversions
              const directRevenue = aff.total_revenue * 0.15; // sales from previous month
              const directComm = directRevenue * (rate / 100);

              // Team/Level bonus
              let teamBonus = 0;
              if (aff.tier_level === 1) {
                // Find all children
                const children = affiliates.filter(x => x.parent_id === aff.id);
                children.forEach(c => {
                  const childRev = c.total_revenue * 0.15;
                  const bonusRate = config.find(r => r.tier_level === 2)?.rate_percent || 3;
                  teamBonus += childRev * (bonusRate / 100);
                });
              }

              return {
                id: `payout-${aff.id}-${Date.now()}`,
                affiliate_name: aff.full_name,
                affiliate_id: aff.id,
                total_conversions: Math.round(aff.total_conversions * 0.15),
                gross_revenue: directRevenue,
                commission_rate: rate,
                net_payable: directComm + teamBonus,
                team_bonus: teamBonus
              };
            });

            setCalcResult({
              period: `${fromDate} -> ${toDate}`,
              payouts,
              summary: {
                total_commission: payouts.reduce((sum, p) => sum + p.net_payable, 0),
                total_affiliates: payouts.length
              }
            });
            setCalcLoading(false);
          }, 1200);
        };

        const submitPayoutWorkflow = (payout) => {
          const newWf = {
            id: `wf-${Date.now()}`,
            type: "payout_approval",
            title: `Duyệt hoa hồng đối tác - ${payout.affiliate_name} (${new Intl.NumberFormat('vi-VN').format(payout.net_payable)}đ)`,
            requester_id: user.id,
            requester_name: user.full_name,
            status: "pending",
            priority: "high",
            current_step: 1,
            total_steps: 2,
            created_at: new Date().toISOString(),
            steps: [
              { step: 1, name: "AM đối soát số liệu", role: "affiliate_manager", status: "pending" },
              { step: 2, name: "Kế toán trưởng duyệt chi", role: "accountant", status: "waiting" }
            ],
            details: payout
          };
          const updated = [newWf, ...workflows];
          setWorkflows(updated);
          db.set("workflows", updated);
          alert("Đã tạo luồng yêu cầu chi hoa hồng! Xem tại tab Duyệt đơn.");
        };

        const sortedAffiliates = useMemo(() => {
          const filtered = affiliates.filter(a => {
            const matchSearch = a.full_name.toLowerCase().includes(search.toLowerCase()) || a.email.toLowerCase().includes(search.toLowerCase());
            const matchStatus = statusFilter ? a.status === statusFilter : true;
            return matchSearch && matchStatus;
          });

          return [...filtered].sort((a, b) => {
            const va = a[sortField] ?? 0;
            const vb = b[sortField] ?? 0;
            return sortDir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
          });
        }, [affiliates, search, statusFilter, sortField, sortDir]);

        const toggleSort = (field) => {
          if (sortField === field) {
            setSortDir(d => d === 'asc' ? 'desc' : 'asc');
          } else {
            setSortField(field);
            setSortDir('desc');
          }
        };

        const totalRevenue = affiliates.reduce((s, a) => s + a.total_revenue, 0);
        const totalCommission = affiliates.reduce((s, a) => s + a.total_commission, 0);

        return (
          <div className="space-y-6 animate-fade-in">
            {/* Tabs selector */}
            <div className="flex gap-1 p-1 bg-surface-card rounded-xl border border-surface-border w-fit">
              {[
                { id: 'list', label: 'Danh sách đối tác', icon: 'Network' },
                { id: 'commission', label: 'Tính toán hoa hồng', icon: 'Calculator' },
                { id: 'postback', label: 'Logs postback URL', icon: 'Activity' }
              ].map(t => (
                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeTab === t.id ? 'bg-brand text-white shadow-glow' : 'text-slate-400 hover:text-slate-200'}`}>
                  <Icon name={t.icon} size={14} /> {t.label}
                </button>
              ))}
            </div>

            {/* TAB: LIST */}
            {activeTab === 'list' && (
              <div className="space-y-4">
                {/* Search & Filters */}
                <div className="flex flex-wrap gap-3">
                  <div className="flex items-center gap-2 bg-surface-card rounded-xl px-3 py-2 border border-surface-border flex-1 max-w-xs">
                    <Icon name="Search" className="text-slate-500" />
                    <input type="text" value={search} onChange={e => setSearch(e.target.value)} className="bg-transparent text-sm text-slate-200 placeholder-slate-500 focus:outline-none w-full" placeholder="Tìm đối tác..." />
                  </div>
                  <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="input w-auto py-2">
                    <option value="">Tất cả trạng thái</option>
                    <option value="active">Hoạt động (Active)</option>
                    <option value="pending">Chờ phê duyệt</option>
                    <option value="suspended">Bị tạm khóa</option>
                  </select>
                  <button onClick={() => setShowAddAffModal(true)} className="btn btn-primary"><Icon name="Plus" /> Thêm đối tác</button>
                </div>

                {/* mini stats */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                  {[
                    { label: 'Tổng số đối tác', val: affiliates.length, color: 'text-white' },
                    { label: 'Hoạt động (Active)', val: affiliates.filter(a => a.status === 'active').length, color: 'text-emerald-400' },
                    { label: 'Tổng doanh thu', val: `${new Intl.NumberFormat('vi-VN').format(totalRevenue)}đ`, color: 'text-blue-400' },
                    { label: 'Hoa hồng phát sinh', val: `${new Intl.NumberFormat('vi-VN').format(totalCommission)}đ`, color: 'text-amber-400' }
                  ].map((s, idx) => (
                    <div key={idx} className="card p-4 text-center">
                      <p className={`text-xl font-black ${s.color}`}>{s.val}</p>
                      <p className="text-xs text-slate-500 mt-1 font-medium">{s.label}</p>
                    </div>
                  ))}
                </div>

                {/* Table */}
                <div className="card">
                  <div className="table-wrapper">
                    <table className="table">
                      <thead>
                        <tr>
                          <th>Mã / Đối tác</th>
                          <th>Cấp độ</th>
                          <th>Traffic Source</th>
                          <th onClick={() => toggleSort('total_clicks')} className="cursor-pointer hover:text-white">Clicks {sortField === 'total_clicks' && (sortDir === 'asc' ? '▲' : '▼')}</th>
                          <th onClick={() => toggleSort('total_conversions')} className="cursor-pointer hover:text-white">Đơn hàng {sortField === 'total_conversions' && (sortDir === 'asc' ? '▲' : '▼')}</th>
                          <th>CR %</th>
                          <th onClick={() => toggleSort('total_revenue')} className="cursor-pointer hover:text-white">Doanh thu {sortField === 'total_revenue' && (sortDir === 'asc' ? '▲' : '▼')}</th>
                          <th>Hoa hồng</th>
                          <th>Trạng thái</th>
                        </tr>
                      </thead>
                      <tbody>
                        {sortedAffiliates.map(aff => (
                          <tr key={aff.id}>
                            <td>
                              <div>
                                <p className="font-mono text-xs text-brand-light">{aff.affiliate_code}</p>
                                <p className="font-bold text-white text-sm">{aff.full_name}</p>
                                <p className="text-xs text-slate-500 font-mono">{aff.email}</p>
                              </div>
                            </td>
                            <td><span className={`badge ${aff.tier_level === 1 ? 'badge-info' : 'badge-success'}`}>Cấp {aff.tier_level}</span></td>
                            <td className="text-xs">{aff.traffic_source}</td>
                            <td className="font-mono text-xs">{aff.total_clicks}</td>
                            <td className="font-mono text-xs">{aff.total_conversions}</td>
                            <td className="font-bold text-emerald-400 text-xs">{aff.total_clicks > 0 ? (aff.total_conversions/aff.total_clicks * 100).toFixed(2) : 0}%</td>
                            <td className="font-bold text-blue-400">{new Intl.NumberFormat('vi-VN').format(aff.total_revenue)}đ</td>
                            <td className="font-bold text-amber-400">{new Intl.NumberFormat('vi-VN').format(aff.total_commission)}đ</td>
                            <td>
                              <span className={`badge ${aff.status === 'active' ? 'badge-success' : aff.status === 'pending' ? 'badge-warning' : 'badge-danger'}`}>
                                {aff.status === 'active' ? 'Active' : aff.status === 'pending' ? 'Pending' : 'Suspended'}
                              </span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* TAB: COMMISSION */}
            {activeTab === 'commission' && (
              <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                {/* Tier config panel */}
                <div className="card p-6 xl:col-span-1 h-fit">
                  <h3 className="font-bold text-white text-base mb-4 flex items-center gap-2"><Icon name="Calculator" className="text-brand" /> Cấu hình Hoa hồng đa cấp</h3>
                  
                  <div className="space-y-4">
                    {config.map(cfg => (
                      <div key={cfg.tier_level} className="flex items-center justify-between p-3 rounded-xl bg-surface-elevated/40 border border-surface-border/50">
                        <div>
                          <p className="font-bold text-white text-sm">{cfg.name}</p>
                          <p className="text-xs text-slate-500">Tier {cfg.tier_level} affiliate</p>
                        </div>
                        {editConfig === cfg.tier_level ? (
                          <div className="flex items-center gap-1.5">
                            <input type="number" step="0.5" value={editRate} onChange={e => setEditRate(e.target.value)} className="input w-16 text-center py-1 px-1.5" />
                            <button onClick={() => handleSaveConfig(cfg.tier_level)} className="btn btn-success btn-sm p-1">✓</button>
                            <button onClick={() => setEditConfig(null)} className="btn btn-secondary btn-sm p-1">✗</button>
                          </div>
                        ) : (
                          <div className="flex items-center gap-2">
                            <span className="text-lg font-black text-emerald-400">{cfg.rate_percent}%</span>
                            <button onClick={() => { setEditConfig(cfg.tier_level); setEditRate(cfg.rate_percent); }} className="text-xs text-brand-light font-bold hover:underline">Sửa</button>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                  
                  <div className="mt-4 p-3.5 bg-brand/10 border border-brand/20 rounded-xl text-xs text-slate-400">
                    💡 **Mô tả**: Khi đối tác Cấp 1 có doanh số, họ sẽ được hưởng % hoa hồng trực tiếp. Nếu họ tuyển thêm đối tác con (Cấp 2) và đối tác con phát sinh đơn, đối tác Cấp 1 sẽ nhận thêm hoa hồng chênh lệch thụ động (ví dụ: L2 = 3%).
                  </div>
                </div>

                {/* Calculation simulation */}
                <div className="card p-6 xl:col-span-2">
                  <h3 className="font-bold text-white text-base mb-2">Tính toán và duyệt chi hoa hồng</h3>
                  <p className="text-xs text-slate-500 mb-4">Mô phỏng đối soát dữ liệu tháng trước của toàn bộ đối tác</p>
                  
                  <button onClick={runCommissionCalculation} disabled={calcLoading} className="btn btn-primary w-full justify-center mb-4">
                    {calcLoading ? <Icon name="Loader2" size={16} className="animate-spin" /> : <Icon name="Calculator" />}
                    {calcLoading ? 'Hệ thống đang đối soát dữ liệu đối tác...' : 'Chạy đối soát và tính hoa hồng tháng vừa qua'}
                  </button>

                  {calcResult && (
                    <div className="space-y-4 animate-fade-in">
                      <div className="p-4 rounded-xl bg-brand/10 border border-brand/20 flex justify-between items-center text-sm">
                        <div>
                          <p className="text-xs text-slate-500">Chu kỳ đối soát</p>
                          <p className="font-bold text-white mt-0.5">{calcResult.period}</p>
                        </div>
                        <div className="text-right">
                          <p className="text-xs text-slate-500">Tổng hoa hồng cần chi</p>
                          <p className="font-black text-emerald-400 text-lg">{new Intl.NumberFormat('vi-VN').format(calcResult.summary.total_commission)}đ</p>
                        </div>
                      </div>

                      <div className="table-wrapper max-h-[220px] overflow-y-auto">
                        <table className="table">
                          <thead>
                            <tr>
                              <th>Đối tác</th>
                              <th>Doanh thu (15%)</th>
                              <th>Rate</th>
                              <th>Được chi trả</th>
                              <th>Duyệt</th>
                            </tr>
                          </thead>
                          <tbody>
                            {calcResult.payouts.map(p => (
                              <tr key={p.id}>
                                <td className="font-bold text-sm text-white">{p.affiliate_name}</td>
                                <td>{new Intl.NumberFormat('vi-VN').format(p.gross_revenue)}đ</td>
                                <td>{p.commission_rate}%</td>
                                <td className="font-bold text-emerald-400">{new Intl.NumberFormat('vi-VN').format(p.net_payable)}đ</td>
                                <td>
                                  <button onClick={() => submitPayoutWorkflow(p)} className="btn btn-secondary btn-sm bg-brand/10 border-brand/20 text-brand-light font-bold hover:bg-brand/20 py-1">
                                    Đệ trình duyệt chi
                                  </button>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* TAB: POSTBACK LOG */}
            {activeTab === 'postback' && (
              <div className="card p-6">
                <h3 className="font-bold text-white text-base mb-4 flex items-center gap-2"><Icon name="Activity" className="text-brand" /> Postback Log realtime</h3>
                <div className="table-wrapper">
                  <table className="table">
                    <thead>
                      <tr>
                        <th>ID</th>
                        <th>Mã đối tác</th>
                        <th>Tên đối tác</th>
                        <th>Click ID</th>
                        <th>Order ID</th>
                        <th>Doanh thu đơn</th>
                        <th>Trạng thái</th>
                        <th>Thời gian nhận</th>
                      </tr>
                    </thead>
                    <tbody>
                      {postbackLogs.map(log => (
                        <tr key={log.id}>
                          <td className="text-xs font-mono text-slate-500">#{log.id}</td>
                          <td className="text-brand-light font-bold font-mono text-xs">{log.affiliate_code}</td>
                          <td className="text-sm font-semibold">{log.affiliate_name}</td>
                          <td className="font-mono text-xs text-slate-400">{log.click_id}</td>
                          <td className="font-mono text-xs text-slate-300">{log.order_id}</td>
                          <td className="font-bold text-emerald-400">{new Intl.NumberFormat('vi-VN').format(log.revenue)}đ</td>
                          <td>
                            <span className={`badge ${log.status === 'confirmed' ? 'badge-success' : 'badge-warning'}`}>
                              {log.status === 'confirmed' ? 'confirmed' : 'pending'}
                            </span>
                          </td>
                          <td className="text-xs font-mono text-slate-400">{new Date(log.received_at).toLocaleString('vi-VN')}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* MODAL: ADD PARTNER */}
            {showAddAffModal && (
              <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="glass-card w-full max-w-md p-6">
                  <div className="flex justify-between items-center mb-4">
                    <h4 className="font-bold text-white flex items-center gap-2"><Icon name="Network" className="text-brand" /> Đăng ký đối tác mới</h4>
                    <button onClick={() => setShowAddAffModal(false)} className="btn-ghost p-1 rounded-lg"><Icon name="X" /></button>
                  </div>
                  <form onSubmit={handleAddAff} className="space-y-4">
                    <div>
                      <label className="label">Tên đối tác / Thương hiệu *</label>
                      <input type="text" value={affForm.full_name} onChange={e => setAffForm({...affForm, full_name: e.target.value})} className="input" required placeholder="Media Star Ltd" />
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="label">Email liên hệ *</label>
                        <input type="email" value={affForm.email} onChange={e => setAffForm({...affForm, email: e.target.value})} className="input" required placeholder="agency@mail.com" />
                      </div>
                      <div>
                        <label className="label">Số điện thoại</label>
                        <input type="text" value={affForm.phone} onChange={e => setAffForm({...affForm, phone: e.target.value})} className="input" placeholder="09xxxxxxx" />
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="label">Nguồn Traffic</label>
                        <select value={affForm.traffic_source} onChange={e => setAffForm({...affForm, traffic_source: e.target.value})} className="input">
                          <option>SEO / Blog</option>
                          <option>Facebook Ads</option>
                          <option>TikTok</option>
                          <option>YouTube</option>
                          <option>Email Marketing</option>
                          <option>Khác</option>
                        </select>
                      </div>
                      <div>
                        <label className="label">Cấp đối tác</label>
                        <select value={affForm.tier_level} onChange={e => setAffForm({...affForm, tier_level: Number(e.target.value)})} className="input">
                          <option value={1}>Lập mới (Cấp 1)</option>
                          <option value={2}>Cấp dưới (Cấp 2)</option>
                          <option value={3}>Cấp dưới (Cấp 3)</option>
                        </select>
                      </div>
                    </div>
                    <div className="flex gap-3 pt-2">
                      <button type="button" onClick={() => setShowAddAffModal(false)} className="btn btn-secondary flex-1 justify-center">Hủy</button>
                      <button type="submit" className="btn btn-primary flex-1 justify-center">Thêm đối tác</button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      };

      // WORKFLOW APPROVALS PAGE
      const WorkflowPage = ({ user }) => {
        const [workflows, setWorkflows] = useState(() => db.get("workflows") || []);
        const [filterTab, setFilterTab] = useState('all'); // all | pending | hr | affiliate
        const [activeWf, setActiveWf] = useState(null); // active workflow details modal
        const [actionForm, setActionForm] = useState({ action: 'approve', note: '' });
        const [actionLoading, setActionLoading] = useState(false);

        const [expandedWf, setExpandedWf] = useState(null);

        const handleActionSubmit = (e) => {
          e.preventDefault();
          setActionLoading(true);

          setTimeout(() => {
            const updated = workflows.map(wf => {
              if (wf.id !== activeWf.id) return wf;

              const stepIdx = wf.steps.findIndex(s => s.status === 'pending');
              if (stepIdx === -1) return wf;

              const updatedSteps = [...wf.steps];
              
              if (actionForm.action === 'approve') {
                updatedSteps[stepIdx] = {
                  ...updatedSteps[stepIdx],
                  status: 'approved',
                  acted_at: new Date().toISOString(),
                  note: actionForm.note
                };

                // Move to next step or complete workflow
                const nextStepIdx = stepIdx + 1;
                let nextStatus = 'approved';
                let nextStep = wf.current_step;

                if (nextStepIdx < wf.total_steps) {
                  updatedSteps[nextStepIdx].status = 'pending';
                  nextStatus = 'in_progress';
                  nextStep += 1;
                }

                // If fully approved payout workflow, update affiliate total paid or status simulation
                if (nextStatus === 'approved' && wf.type === 'payout_approval') {
                  const payouts = db.get("affiliates") || [];
                  const affId = wf.details?.affiliate_id;
                  const netPay = wf.details?.net_payable;
                  if (affId) {
                    const updatedAffs = payouts.map(a => a.id === affId ? { ...a, total_commission: a.total_commission - netPay } : a);
                    db.set("affiliates", updatedAffs);
                  }
                }

                return {
                  ...wf,
                  status: nextStatus,
                  current_step: nextStep,
                  steps: updatedSteps
                };

              } else {
                // Reject or info requested
                updatedSteps[stepIdx] = {
                  ...updatedSteps[stepIdx],
                  status: actionForm.action === 'reject' ? 'rejected' : 'waiting_info',
                  acted_at: new Date().toISOString(),
                  note: actionForm.note
                };

                return {
                  ...wf,
                  status: actionForm.action === 'reject' ? 'rejected' : 'in_progress',
                  steps: updatedSteps
                };
              }
            });

            setWorkflows(updated);
            db.set("workflows", updated);
            
            setActionLoading(false);
            setActiveWf(null);
            setActionForm({ action: 'approve', note: '' });
          }, 800);
        };

        const hasApprovalRight = (wf) => {
          const step = wf.steps.find(s => s.status === 'pending');
          return step && (step.role === user.role || user.role === 'admin');
        };

        const filteredWfs = useMemo(() => {
          return workflows.filter(w => {
            if (filterTab === 'pending') return w.status === 'pending' || w.status === 'in_progress';
            if (filterTab === 'hr') return w.type === 'leave_request';
            if (filterTab === 'affiliate') return w.type === 'payout_approval';
            return true;
          });
        }, [workflows, filterTab]);

        const priorityConfig = {
          low: { label: 'Thấp', cls: 'badge-neutral' },
          normal: { label: 'Bình thường', cls: 'badge-info' },
          high: { label: 'Ưu tiên cao', cls: 'badge-warning' },
          urgent: { label: 'Khẩn cấp!', cls: 'badge-danger animate-pulse' }
        };

        const statusConfig = {
          pending: { label: 'Chờ duyệt', cls: 'badge-warning' },
          in_progress: { label: 'Đang xử lý', cls: 'badge-info' },
          approved: { label: 'Đã phê duyệt', cls: 'badge-success' },
          rejected: { label: 'Từ chối', cls: 'badge-danger' }
        };

        return (
          <div className="space-y-6 animate-fade-in">
            {/* Stats matrix */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {[
                { label: 'Tổng số đơn yêu cầu', val: workflows.length, color: 'text-white' },
                { label: 'Đang chờ duyệt', val: workflows.filter(w => w.status === 'pending').length, color: 'text-amber-400' },
                { label: 'Đang xử lý', val: workflows.filter(w => w.status === 'in_progress').length, color: 'text-blue-400' },
                { label: 'Đã hoàn tất', val: workflows.filter(w => w.status === 'approved' || w.status === 'rejected').length, color: 'text-emerald-400' }
              ].map((s, idx) => (
                <div key={idx} className="card p-4 text-center">
                  <p className={`text-2xl font-black ${s.color}`}>{s.val}</p>
                  <p className="text-xs text-slate-500 mt-1 font-medium">{s.label}</p>
                </div>
              ))}
            </div>

            {/* Filter Tabs */}
            <div className="flex gap-1 p-1 bg-surface-card rounded-xl border border-surface-border w-fit">
              {[
                { id: 'all', label: 'Tất cả' },
                { id: 'pending', label: 'Chờ xử lý' },
                { id: 'hr', label: '🏖️ Nhân sự & Nghỉ phép' },
                { id: 'affiliate', label: '💰 Thanh toán Affiliate' }
              ].map(t => (
                <button key={t.id} onClick={() => setFilterTab(t.id)} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${filterTab === t.id ? 'bg-brand text-white shadow-glow' : 'text-slate-400 hover:text-slate-200'}`}>
                  {t.label}
                </button>
              ))}
            </div>

            {/* Cards List */}
            <div className="space-y-3">
              {filteredWfs.length === 0 ? (
                <div className="card p-12 text-center text-slate-500 font-medium">Không tìm thấy yêu cầu nào phù hợp</div>
              ) : (
                filteredWfs.map(wf => {
                  const pr = priorityConfig[wf.priority] || priorityConfig.normal;
                  const st = statusConfig[wf.status] || statusConfig.pending;
                  const isExpanded = expandedWf === wf.id;

                  return (
                    <div key={wf.id} className="card overflow-hidden hover:border-brand/20 transition-all duration-200">
                      {/* Summary Trigger */}
                      <div onClick={() => setExpandedWf(isExpanded ? null : wf.id)} className="p-5 flex items-center justify-between gap-4 cursor-pointer">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                            <span className={`badge ${pr.cls} text-[9px] uppercase`}>{pr.label}</span>
                            <span className={`badge ${st.cls} text-[9px] uppercase`}>{st.label}</span>
                            <span className="text-[10px] text-slate-500 font-mono">#{wf.id}</span>
                          </div>
                          <h4 className="font-bold text-white text-sm md:text-base line-clamp-1">{wf.title}</h4>
                          <p className="text-xs text-slate-500 mt-1">Yêu cầu bởi: <strong className="text-slate-300">{wf.requester_name}</strong> • Khởi tạo: {new Date(wf.created_at).toLocaleDateString('vi-VN')}</p>
                        </div>
                        <div className="flex items-center gap-3">
                          <div className="text-right hidden sm:block">
                            <p className="text-xs text-slate-400">Tiến trình</p>
                            <p className="text-sm font-bold text-white mt-0.5">{wf.current_step}/{wf.total_steps} Cấp</p>
                          </div>
                          <Icon name={isExpanded ? 'ChevronUp' : 'ChevronDown'} size={18} className="text-slate-500" />
                        </div>
                      </div>

                      {/* Detailed timeline expanded */}
                      {isExpanded && (
                        <div className="border-t border-surface-border bg-surface-elevated/10 p-5 space-y-4">
                          {/* Render details if leave request */}
                          {wf.details && wf.type === 'leave_request' && (
                            <div className="p-3 bg-brand/10 border border-brand/20 rounded-xl text-xs space-y-1">
                              <p className="text-brand-light font-bold">Chi tiết đơn nghỉ phép:</p>
                              <p>Loại phép: <strong>{wf.details.leave_type}</strong></p>
                              <p>Thời gian: <strong>{wf.details.start_date}</strong> đến <strong>{wf.details.end_date}</strong> ({wf.details.total_days} ngày)</p>
                              <p>Lý do: <em>"{wf.details.reason}"</em></p>
                            </div>
                          )}

                          {/* Render details if payout */}
                          {wf.details && wf.type === 'payout_approval' && (
                            <div className="p-3 bg-brand/10 border border-brand/20 rounded-xl text-xs space-y-1">
                              <p className="text-brand-light font-bold">Chi tiết thanh toán hoa hồng:</p>
                              <p>Doanh thu đối tác trực tiếp: <strong>{new Intl.NumberFormat('vi-VN').format(wf.details.gross_revenue)}đ</strong></p>
                              <p>Hoa hồng chênh lệch thụ động (L2): <strong>{new Intl.NumberFormat('vi-VN').format(wf.details.team_bonus)}đ</strong></p>
                              <p>Tổng tiền thanh toán: <strong className="text-emerald-400 text-sm">{new Intl.NumberFormat('vi-VN').format(wf.details.net_payable)}đ</strong></p>
                            </div>
                          )}

                          <h5 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Tiến trình phê duyệt đa cấp:</h5>
                          
                          <div className="space-y-2.5">
                            {wf.steps.map((s, sIdx) => {
                              const isStepPending = s.status === 'pending';
                              const isStepApproved = s.status === 'approved';
                              const isStepWaiting = s.status === 'waiting';
                              const isStepRejected = s.status === 'rejected';

                              let borderCls = 'border-slate-800 bg-slate-900/30';
                              let badge = <span className="badge badge-neutral">Chưa đến lượt</span>;
                              
                              if (isStepPending) {
                                borderCls = 'border-amber-500/30 bg-amber-500/5';
                                badge = <span className="badge badge-warning">Đang chờ duyệt</span>;
                              } else if (isStepApproved) {
                                borderCls = 'border-emerald-500/30 bg-emerald-500/5';
                                badge = <span className="badge badge-success">✓ Đã thông qua</span>;
                              } else if (isStepRejected) {
                                borderCls = 'border-red-500/30 bg-red-500/5';
                                badge = <span className="badge badge-danger">✗ Bị từ chối</span>;
                              }

                              return (
                                <div key={sIdx} className={`p-3 border rounded-xl flex items-start justify-between gap-4 ${borderCls}`}>
                                  <div className="flex gap-3">
                                    <div className={`w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs ${isStepApproved ? 'bg-emerald-500 text-white' : isStepPending ? 'bg-amber-500 text-white' : 'bg-slate-700 text-slate-500'}`}>
                                      {s.step}
                                    </div>
                                    <div>
                                      <p className="text-sm font-bold text-white">{s.name}</p>
                                      <p className="text-[10px] text-slate-500 capitalize">Phê duyệt bởi vai trò: {s.role.replace('_', ' ')}</p>
                                      {s.acted_at && <p className="text-[10px] text-slate-400 font-mono mt-0.5">{new Date(s.acted_at).toLocaleString('vi-VN')}</p>}
                                      {s.note && <p className="text-xs text-slate-400 italic mt-1 font-mono">"{s.note}"</p>}
                                    </div>
                                  </div>
                                  {badge}
                                </div>
                              );
                            })}
                          </div>

                          {/* Action button if currently pending for the logged in user */}
                          {hasApprovalRight(wf) && (wf.status === 'pending' || wf.status === 'in_progress') && (
                            <button onClick={() => setActiveWf(wf)} className="btn btn-primary w-full justify-center">
                              <Icon name="CheckCircle" /> Xử lý và phê duyệt đơn này
                            </button>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })
              )}
            </div>

            {/* Action modal popup */}
            {activeWf && (
              <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="glass-card w-full max-w-md p-6">
                  <div className="flex justify-between items-center mb-4">
                    <h4 className="font-bold text-white text-base">Phê duyệt yêu cầu</h4>
                    <button onClick={() => setActiveWf(null)} className="btn-ghost p-1 rounded-lg"><Icon name="X" /></button>
                  </div>
                  
                  <div className="p-3.5 bg-surface-elevated/50 border border-surface-border rounded-xl text-xs mb-4">
                    <p className="font-bold text-white text-sm truncate">{activeWf.title}</p>
                    <p className="text-slate-500 mt-1">Người yêu cầu: {activeWf.requester_name}</p>
                  </div>

                  <form onSubmit={handleActionSubmit} className="space-y-4">
                    <div>
                      <label className="label">Hành động phê duyệt</label>
                      <div className="grid grid-cols-3 gap-2">
                        {[
                          { id: 'approve', label: 'Thông qua', cls: 'btn-success bg-emerald-600' },
                          { id: 'reject', label: 'Từ chối', cls: 'btn-danger bg-red-600' },
                          { id: 'info', label: 'Cần làm rõ', cls: 'btn-secondary' }
                        ].map(act => (
                          <button key={act.id} type="button" onClick={() => setActionForm({...actionForm, action: act.id})} className={`btn btn-sm justify-center ${actionForm.action === act.id ? act.cls : 'btn-secondary opacity-60'}`}>
                            {act.label}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="label">Ý kiến đóng góp (Bắt buộc nếu Từ chối/Yêu cầu làm rõ)</label>
                      <textarea value={actionForm.note} onChange={e => setActionForm({...actionForm, note: e.target.value})} className="input h-20 resize-none" placeholder="Nhập ý kiến phê duyệt hoặc lý do..." required={actionForm.action !== 'approve'}></textarea>
                    </div>

                    <div className="flex gap-3 pt-2">
                      <button type="button" onClick={() => setActiveWf(null)} className="btn btn-secondary flex-1 justify-center">Hủy</button>
                      <button type="submit" disabled={actionLoading} className="btn btn-primary flex-1 justify-center">
                        {actionLoading ? <Icon name="Loader2" size={14} className="animate-spin" /> : null}
                        Xác nhận xử lý
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      };

      // REPORTS & ANALYTICS PAGE
      const ReportsPage = () => {
        const [period, setPeriod] = useState('30d');
        const [employees] = useState(() => db.get("employees") || []);
        const [timesheets] = useState(() => db.get("timesheets") || []);
        const [affiliates] = useState(() => db.get("affiliates") || []);

        const totalClicks = affiliates.reduce((s,a) => s + a.total_clicks, 0);
        const totalConversions = affiliates.reduce((s,a) => s + a.total_conversions, 0);
        const avgCR = totalClicks > 0 ? (totalConversions/totalClicks * 100).toFixed(2) : 0;

        return (
          <div className="space-y-6 animate-fade-in">
            {/* Header filters */}
            <div className="flex justify-between items-center">
              <div className="flex gap-1 p-1 bg-surface-card rounded-xl border border-surface-border">
                {['7d', '30d', '90d'].map(p => (
                  <button key={p} onClick={() => setPeriod(p)} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${period === p ? 'bg-brand text-white' : 'text-slate-400 hover:text-slate-200'}`}>
                    {p}
                  </button>
                ))}
              </div>
              <p className="text-xs text-slate-500 font-medium">Báo cáo cập nhật theo chu kỳ</p>
            </div>

            {/* Stats row */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              {[
                { label: 'Tổng số Clicks ghi nhận', val: totalClicks.toLocaleString(), icon: 'Activity', color: 'text-brand-light' },
                { label: 'Số đơn thành công (Conversions)', val: totalConversions.toLocaleString(), icon: 'TrendingUp', color: 'text-emerald-400' },
                { label: 'Tỷ lệ chuyển đổi trung bình (Avg CR)', val: `${avgCR}%`, icon: 'BarChart3', color: 'text-amber-400' }
              ].map((s, idx) => (
                <div key={idx} className="card p-5 flex items-center gap-4">
                  <div className="p-3 rounded-xl bg-brand/10 border border-brand/20">
                    <Icon name={s.icon} size={20} className={s.color} />
                  </div>
                  <div>
                    <p className={`text-2xl font-black ${s.color}`}>{s.val}</p>
                    <p className="text-xs text-slate-500 mt-0.5">{s.label}</p>
                  </div>
                </div>
              ))}
            </div>

            {/* Graphs grid */}
            <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
              {/* Click CR line chart */}
              <div className="card p-5">
                <h4 className="font-bold text-white text-sm mb-1">Clicks & Conversion Rate (CR)</h4>
                <p className="text-xs text-slate-500 mb-4">Mô phỏng dữ liệu clicks và tỷ lệ chuyển đổi hàng ngày</p>
                <div className="h-56 flex items-center justify-center">
                  <AreaLineChart period={period} />
                </div>
              </div>

              {/* Conversions bar chart */}
              <div className="card p-5">
                <h4 className="font-bold text-white text-sm mb-1">Số đơn hàng thành công theo ngày</h4>
                <p className="text-xs text-slate-500 mb-4">Dữ liệu ghi nhận thông qua Universal Postback API</p>
                <div className="h-56 flex items-center justify-center">
                  <ConversionsBarChart period={period} />
                </div>
              </div>

              {/* Attendance Stacked Bar chart */}
              <div className="card p-5">
                <h4 className="font-bold text-white text-sm mb-1">Thống kê ngày công nhân viên</h4>
                <p className="text-xs text-slate-500 mb-4">Tỷ lệ đi làm đúng giờ, đi muộn và vắng mặt</p>
                <div className="h-56 flex items-center justify-center">
                  <AttendanceStackedChart employees={employees} timesheets={timesheets} />
                </div>
              </div>

              {/* Top Affiliates rank chart */}
              <div className="card p-5">
                <h4 className="font-bold text-white text-sm mb-1">Xếp hạng đối tác liên kết cao nhất</h4>
                <p className="text-xs text-slate-500 mb-4">So sánh tương quan giữa doanh thu (M) và hoa hồng được hưởng (M)</p>
                <div className="h-56 flex items-center justify-center">
                  <TopAffiliateRevenueChart affiliates={affiliates} />
                </div>
              </div>
            </div>
          </div>
        );
      };

      // INTEGRATION HUB PAGE
      const IntegrationPage = () => {
        const [integrations, setIntegrations] = useState(() => db.get("integrations") || []);
        const [syncingId, setSyncingId] = useState(null);

        const handleSync = (id) => {
          setSyncingId(id);
          setTimeout(() => {
            const updated = integrations.map(int => {
              if (int.id === id) {
                return {
                  ...int,
                  status: 'active',
                  last_sync: new Date().toISOString()
                };
              }
              return int;
            });
            setIntegrations(updated);
            db.set("integrations", updated);
            setSyncingId(null);
            alert("Đồng bộ dữ liệu thành công!");
          }, 1500);
        };

        const typeLabels = {
          payment_gateway: 'Cổng thanh toán',
          tracking_network: 'Tracking Network',
          attendance_device: 'Thiết bị chấm công',
          webhook: 'Webhook'
        };

        const typeConfigs = {
          payment_gateway: { icon: 'CreditCard', color: 'text-emerald-400', bg: 'bg-emerald-500/10 border-emerald-500/20' },
          tracking_network: { icon: 'Network', color: 'text-blue-400', bg: 'bg-blue-500/10 border-blue-500/20' },
          attendance_device: { icon: 'Fingerprint', color: 'text-purple-400', bg: 'bg-purple-500/10 border-purple-500/20' },
          webhook: { icon: 'Webhook', color: 'text-amber-400', bg: 'bg-amber-500/10 border-amber-500/20' }
        };

        return (
          <div className="space-y-6 animate-fade-in">
            {/* Quick URL endpoint references */}
            <div className="card p-5 bg-gradient-to-r from-brand/10 to-blue-500/10 border-brand/20">
              <div className="flex gap-4">
                <div className="p-3 rounded-xl bg-brand/20 border border-brand/30 h-fit">
                  <Icon name="Zap" size={20} className="text-brand-light" />
                </div>
                <div>
                  <h3 className="font-bold text-white text-sm md:text-base mb-2">Universal Postback & API Endpoints</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                    {[
                      { label: 'Postback Tracking URL', url: 'POST /api/affiliates/postback', note: 'Params: affiliate_code, click_id, revenue' },
                      { label: 'Đồng bộ thiết bị chấm công ZKTeco', url: 'POST /api/attendance/sync-device', note: 'Header: X-Device-ID: ZK-9988' }
                    ].map((ep, idx) => (
                      <div key={idx} className="p-3 bg-surface-card rounded-xl border border-surface-border">
                        <p className="text-xs font-bold text-slate-300">{ep.label}</p>
                        <code className="text-[10px] text-brand-light font-mono block mt-1">{ep.url}</code>
                        <p className="text-[9px] text-slate-500 mt-1">{ep.note}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            {/* Integrations grid list */}
            <div>
              <h3 className="font-semibold text-slate-300 text-sm mb-4">Các cổng dịch vụ đã kết nối</h3>
              
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                {integrations.map(int => {
                  const tc = typeConfigs[int.type] || typeConfigs.webhook;
                  const isSyncing = syncingId === int.id;

                  return (
                    <div key={int.id} className="card p-4 flex flex-col justify-between hover:border-brand/35 transition-all">
                      <div>
                        <div className="flex items-start justify-between gap-3">
                          <div className="flex items-center gap-3">
                            <div className={`p-2.5 rounded-xl border ${tc.bg}`}>
                              <Icon name={tc.icon} size={18} className={tc.color} />
                            </div>
                            <div>
                              <p className="font-bold text-white text-sm">{int.name}</p>
                              <p className="text-[10px] text-slate-500">{typeLabels[int.type]}</p>
                            </div>
                          </div>
                          <span className={`badge ${int.status === 'active' ? 'badge-success' : 'badge-neutral'} text-[9px]`}>
                            {int.status === 'active' ? 'Hoạt động' : 'Tắt'}
                          </span>
                        </div>

                        <div className="my-4 text-xs text-slate-400">
                          <p>Lần đồng bộ cuối: <strong className="text-slate-300">{int.last_sync ? new Date(int.last_sync).toLocaleString('vi-VN') : 'Chưa đồng bộ'}</strong></p>
                        </div>
                      </div>

                      <div className="flex gap-2">
                        <button onClick={() => handleSync(int.id)} disabled={isSyncing || int.status !== 'active'} className="btn btn-primary btn-sm flex-1 justify-center">
                          {isSyncing ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="RefreshCw" />}
                          {isSyncing ? 'Đồng bộ...' : 'Đồng bộ ngay'}
                        </button>
                        <button className="btn btn-secondary btn-sm"><Icon name="Settings" size={14} /></button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      // RBAC CONFIG MATRIX PAGE (System)
      const RbacPage = () => {
        const [permissions, setPermissions] = useState(() => db.get("permissions") || {});
        
        const roleLabels = {
          admin: 'Admin / CEO',
          hr: 'Phòng Nhân Sự',
          affiliate_manager: 'Affiliate Manager',
          accountant: 'Kế Toán Trưởng',
          employee: 'Nhân Viên'
        };

        const moduleLabels = {
          dashboard: 'Tổng quan Dashboard',
          attendance: 'Chấm Công & GPS',
          employees: 'Hồ Sơ Nhân Viên',
          affiliates: 'Danh Sách Đối Tác Affiliate',
          commission: 'Cấu Hình & Tính Hoa Hồng',
          payouts: 'Duyệt Chi Trả Hoa Hồng',
          workflow: 'Hàng Chờ Duyệt Workflow',
          reports: 'Báo Cáo Analytics',
          integration: 'Cổng Integration Hub',
          rbac: 'Phân Quyền RBAC Matrix'
        };

        const handlePermissionToggle = (role, module) => {
          if (role === 'admin') return; // Admin has full access always
          
          const rolePerms = permissions[role] || [];
          let updatedPerms = [];
          
          if (rolePerms.includes(module)) {
            updatedPerms = rolePerms.filter(m => m !== module);
          } else {
            updatedPerms = [...rolePerms, module];
          }

          const updated = {
            ...permissions,
            [role]: updatedPerms
          };

          setPermissions(updated);
          db.set("permissions", updated);
        };

        return (
          <div className="card p-6 animate-fade-in">
            <h3 className="font-bold text-white text-base mb-2 flex items-center gap-2"><Icon name="Shield" className="text-brand" /> Cấu hình ma trận phân quyền hệ thống (RBAC)</h3>
            <p className="text-xs text-slate-500 mb-6">Tích chọn các ô để bật/tắt quyền truy cập module của từng nhóm chức danh (Admin giữ toàn quyền)</p>
            
            <div className="table-wrapper">
              <table className="table">
                <thead>
                  <tr className="border-b border-surface-border text-xs uppercase text-slate-500">
                    <th className="py-3 px-4">Module hệ thống</th>
                    {Object.entries(roleLabels).map(([role, label]) => (
                      <th key={role} className="py-3 px-4 text-center">{label}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {Object.entries(moduleLabels).map(([module, modLabel]) => (
                    <tr key={module} className="border-b border-surface-border/40 hover:bg-slate-800/30">
                      <td className="py-3.5 px-4 text-sm font-semibold text-slate-200">{modLabel}</td>
                      {Object.keys(roleLabels).map(role => {
                        const hasAccess = role === 'admin' || (permissions[role] && permissions[role].includes(module));
                        return (
                          <td key={role} className="py-3.5 px-4 text-center">
                            <input
                              type="checkbox"
                              checked={hasAccess}
                              disabled={role === 'admin'}
                              onChange={() => handlePermissionToggle(role, module)}
                              className="w-4 h-4 rounded border-slate-700 text-brand bg-slate-800 focus:ring-brand focus:ring-offset-slate-900 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                            />
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="mt-6 p-4 rounded-xl bg-amber-500/10 border border-amber-500/20 text-xs text-amber-300">
              ⚠️ **Lưu ý**: Việc thay đổi ma trận phân quyền này sẽ ảnh hưởng trực tiếp đến thanh điều hướng (Sidebar) và quyền truy cập các màn hình của người dùng ngay lập tức mà không cần tải lại trang.
            </div>
          </div>
        );
      };

      // ────────────────────────────────────────────────────────
      // MAIN APP ROUTER & WRAPPER
      // ────────────────────────────────────────────────────────
      const App = () => {
        const [user, setUser] = useState(() => {
          const cached = localStorage.getItem("gc_active_user");
          return cached ? JSON.parse(cached) : null;
        });

        const [currentTab, setCurrentTab] = useState(() => {
          const hash = window.location.hash.replace('#/', '');
          return hash || 'dashboard';
        });

        const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

        // Sync tab route with window hash
        useEffect(() => {
          const handleHashChange = () => {
            const hash = window.location.hash.replace('#/', '');
            setCurrentTab(hash || 'dashboard');
          };
          window.addEventListener('hashchange', handleHashChange);
          return () => window.removeEventListener('hashchange', handleHashChange);
        }, []);

        const navigateTo = (tab) => {
          window.location.hash = `#/${tab}`;
        };

        const handleLogin = (employee) => {
          setUser(employee);
          localStorage.setItem("gc_active_user", JSON.stringify(employee));
          navigateTo('dashboard');
        };

        const handleLogout = () => {
          setUser(null);
          localStorage.removeItem("gc_active_user");
          window.location.hash = '#/login';
        };

        const handleRoleChange = (role) => {
          const employees = db.get("employees") || [];
          // Find employee with this role or update active user role simulation
          const updated = {
            ...user,
            role: role,
            full_name: role === 'admin' ? 'Nguyễn Văn Admin' : role === 'hr' ? 'Trần Thị HR' : role === 'affiliate_manager' ? 'Lê Minh AM' : role === 'accountant' ? 'Phạm Kế Toán' : 'Hoàng Văn B'
          };
          setUser(updated);
          localStorage.setItem("gc_active_user", JSON.stringify(updated));
        };

        // If not logged in, force Login page
        if (!user) {
          return <LoginPage onLogin={handleLogin} />;
        }

        // Render appropriate tab page
        const renderContent = () => {
          switch (currentTab) {
            case 'dashboard':
              return <DashboardPage user={user} onNavigate={navigateTo} />;
            case 'attendance':
              return <AttendancePage user={user} />;
            case 'employees':
              return <EmployeesPage />;
            case 'affiliates':
              return <AffiliatePage user={user} />;
            case 'workflow':
              return <WorkflowPage user={user} />;
            case 'reports':
              return <ReportsPage />;
            case 'integration':
              return <IntegrationPage />;
            case 'rbac':
              return <RbacPage />;
            default:
              return <DashboardPage user={user} onNavigate={navigateTo} />;
          }
        };

        const tabTitles = {
          dashboard: 'Tổng quan Dashboard',
          attendance: 'Chấm Công & GPS',
          employees: 'Sơ đồ tổ chức & Nhân sự',
          affiliates: 'Quản Lý Đối Tác Affiliate',
          workflow: 'Workflow & Phê Duyệt Đơn',
          reports: 'Báo Cáo & Phân Tích Metrics',
          integration: 'API Integration Hub',
          rbac: 'Phân Quyền Hệ Thống (RBAC)'
        };

        return (
          <div className="flex h-screen overflow-hidden bg-surface">
            {/* Sidebar Left */}
            <Sidebar
              currentTab={currentTab}
              onNavigate={navigateTo}
              collapsed={sidebarCollapsed}
              onToggle={() => setSidebarCollapsed(!sidebarCollapsed)}
              user={user}
              onLogout={handleLogout}
            />

            {/* Main content right */}
            <div className={`flex flex-col flex-1 min-w-0 overflow-hidden transition-all duration-300 ${sidebarCollapsed ? 'ml-16' : 'ml-64'}`}>
              <Header
                title={tabTitles[currentTab] || 'GoClick ERP'}
                subtitle={currentTab === 'dashboard' ? `Chào mừng trở lại, ${user.full_name} 👋` : 'Hệ thống ERP phiên bản trực quan'}
                user={user}
                onRoleChange={handleRoleChange}
                onLogout={handleLogout}
              />
              <main className="flex-1 overflow-y-auto p-6">
                {renderContent()}
              </main>
            </div>
          </div>
        );
      };

      // RENDER APP ROOT
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
