          const clicks = 800 + (i % 5) * 150 + (30 - i) * 10;

            cr

        const maxCR = 10;

        const chartW = width - padding * 2;
        const chartH = height - padding * 2;

        const getX = (index) => padding + (index * (chartW / (data.length - 1)));
        const getYClicks = (val) => height - padding - ((val / maxClicks) * chartH);
        const getYCR = (val) => height - padding - ((val / maxCR) * chartH);

        // Build SVG paths
        let areaPath = '';
        let linePath = '';
        let crPath = '';

        data.forEach((d, i) => {
          const x = getX(i);
          const yC = getYClicks(d.clicks);
          const yCR = getYCR(d.cr);

          if (i === 0) {
            areaPath = `M ${x} ${height - padding} L ${x} ${yC}`;
            linePath = `M ${x} ${yC}`;
            crPath = `M ${x} ${yCR}`;
          } else {
            areaPath += ` L ${x} ${yC}`;
            linePath += ` L ${x} ${yC}`;
            crPath += ` L ${x} ${yCR}`;
          }

          if (i === data.length - 1) {
            areaPath += ` L ${x} ${height - padding} Z`;
          }
        });

        return (
          <div className="w-full">
            <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full text-slate-500 font-sans">
              <defs>
                <linearGradient id="purpleG" x1="0" y1="0" x2="0" y2="1">

              ))}
              {data.map((d, i) => (
                <circle key={`cr-${i}`} cx={getX(i)} cy={getYCR(d.cr)} r="3" fill="#10b981" />
              ))}

              {/* X Axis Labels */}
              {data.map((d, i) => {

                  ) : (
                    pendingForRole.slice(0, 3).map(wf => (
                      <div key={wf.id} onClick={() => onNavigate('workflow')} className="flex items-center justify-between p-3 rounded-xl bg-surface-elevated/40 hover:bg-surface-elevated border border-surface-border/50 cursor-pointer transition-all">
                        <div className="flex items-start gap-2.5">
                          <span className={`w-2 h-2 rounded-full mt-1.5 ${wf.priority === 'urgent' ? 'bg-red-500 animate-pulse' : wf.priority === 'high' ? 'bg-amber-500' : 'bg-brand'}`} />
                          <div>
                            <p className="text-sm font-semibold text-white line-clamp-1">{wf.title}</p>
                            <p className="text-[10px] text-slate-500 mt-0.5">Yêu cầu bởi: {wf.requester_name} • Step {wf.current_step}/{wf.total_steps}</p>
                          </div>
                        </div>
                        <span className={`badge badge-neutral text-[10px] uppercase`}>
                          {wf.type === 'leave_request' ? 'Nghỉ phép' : 'Hoa hồng'}
                        </span>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ATTENDANCE & LEAVE PAGE
      const AttendancePage = ({ user }) => {
        const [timesheets, setTimesheets] = useState(() => db.get("timesheets") || []);
        const [workflows, setWorkflows] = useState(() => db.get("workflows") || []);
        const [employees] = useState(() => db.get("employees") || []);
        const [month, setMonth] = useState(() => {
          const now = new Date();
          return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        });
        const [selectedEmp, setSelectedEmp] = useState(user.id);
        const [showCheckinModal, setShowCheckinModal] = useState(false);
        const [showLeaveModal, setShowLeaveModal] = useState(false);
        const [checkinLoading, setCheckinLoading] = useState(false);
        const [checkinStatus, setCheckinStatus] = useState('idle'); // idle | locating | success | error
        const [checkinNote, setCheckinNote] = useState('');
        const [leaveForm, setLeaveForm] = useState({ leave_type: 'Nghỉ phép năm', start_date: '', end_date: '', reason: '' });
        const [leaveSuccess, setLeaveSuccess] = useState(false);

        // Filters
        const filteredRecords = useMemo(() => {
          return timesheets.filter(t => t.employee_id === selectedEmp && t.work_date.startsWith(month));
        }, [timesheets, selectedEmp, month]);

        const summaryStats = useMemo(() => {
          const present = filteredRecords.filter(t => t.status === 'present').length;
          const late = filteredRecords.filter(t => t.status === 'late').length;
          const absent = filteredRecords.filter(t => t.status === 'absent').length;
          const totalHours = filteredRecords.reduce((sum, r) => sum + (r.working_hours || 0), 0);
          const otHours = filteredRecords.reduce((sum, r) => sum + (r.ot_hours || 0), 0);
          return { present, late, absent, totalHours, otHours };
        }, [filteredRecords]);

        // Build Calendar Matrix (Mon-Sun layout)
        const calendarGrid = useMemo(() => {
          const [yr, mn] = month.split('-').map(Number);
          const firstDayIndex = (new Date(yr, mn - 1, 1).getDay() + 6) % 7; // Mon index 0
          const totalDays = new Date(yr, mn, 0).getDate();
          
          const grid = [];
          for (let i = 0; i < firstDayIndex; i++) grid.push(null);
          for (let d = 1; d <= totalDays; d++) grid.push(d);
          return grid;
        }, [month]);

        // Handlers
        const handleGPSCheckin = () => {
          setCheckinStatus('locating');
          setCheckinLoading(true);
          setTimeout(() => {
            const today = new Date();
            const dateStr = today.toISOString().slice(0, 10);
            
            // Check if already checked in today
            const exists = timesheets.find(t => t.employee_id === user.id && t.work_date === dateStr);
            if (exists) {
              setCheckinStatus('error');
              setCheckinLoading(false);
              alert("Bạn đã chấm công ngày hôm nay rồi!");
              return;
            }

            const checkInHour = today.getHours() + today.getMinutes()/60;
            const status = checkInHour > 8.5 ? "late" : "present";
            const newRecord = {
              id: `ts-${user.id}-${today.getDate()}-${Date.now()}`,
              employee_id: user.id,
              employee_name: user.full_name,
              work_date: dateStr,
              check_in_time: today.toISOString(),
              check_out_time: null,
              status: status,
              source: "gps",
              working_hours: status === 'present' ? 8.0 : 7.0,
              ot_hours: 0,
              note: checkinNote
            };

            const updated = [newRecord, ...timesheets];
            setTimesheets(updated);
            db.set("timesheets", updated);
            
            setCheckinStatus('success');
            setCheckinLoading(false);
            setTimeout(() => {
              setShowCheckinModal(false);
              setCheckinStatus('idle');
              setCheckinNote('');
            }, 1200);
          }, 1500);
        };

        const handleLeaveSubmit = (e) => {
          e.preventDefault();
          const start = new Date(leaveForm.start_date);
          const end = new Date(leaveForm.end_date);
          const days = Math.round((end - start) / 86400000) + 1;

          if (days <= 0 || isNaN(days)) {
            alert("Vui lòng chọn ngày hợp lệ!");
            return;
          }

          const newWf = {
            id: `wf-${Date.now()}`,
            type: "leave_request",
            title: `Đơn nghỉ ${leaveForm.leave_type.toLowerCase()} - ${user.full_name} (${leaveForm.start_date} -> ${leaveForm.end_date})`,
            requester_id: user.id,
            requester_name: user.full_name,
            status: "pending",
            priority: "normal",
            current_step: 1,
            total_steps: 2,
            created_at: new Date().toISOString(),
            steps: [
              { step: 1, name: "Trưởng phòng duyệt", role: "affiliate_manager", status: "pending" },
              { step: 2, name: "HR ghi nhận", role: "hr", status: "waiting" }
            ],
            details: {
              leave_type: leaveForm.leave_type,
              start_date: leaveForm.start_date,
              end_date: leaveForm.end_date,
              total_days: days,
              reason: leaveForm.reason
            }
          };

          const updatedWfs = [newWf, ...workflows];
          setWorkflows(updatedWfs);
          db.set("workflows", updatedWfs);

          setLeaveSuccess(true);
          setTimeout(() => {
            setShowLeaveModal(false);
            setLeaveSuccess(false);
            setLeaveForm({ leave_type: 'Nghỉ phép năm', start_date: '', end_date: '', reason: '' });
          }, 1500);
        };

        const getCellStyles = (day) => {
          if (!day) return 'bg-transparent border-transparent';
          const [yr, mn] = month.split('-').map(Number);
          const dateStr = `${yr}-${String(mn).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          const rec = filteredRecords.find(t => t.work_date === dateStr);
          const isToday = new Date().toISOString().slice(0, 10) === dateStr;

          const dayOfWeek = new Date(yr, mn - 1, day).getDay();
          const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

          let bg = 'bg-surface-elevated/30 border-surface-border text-slate-500';
          let label = '';
          if (rec) {
            if (rec.status === 'present') { bg = 'bg-emerald-950/40 border-emerald-700/30 text-emerald-400'; label = 'Đúng giờ'; }
            if (rec.status === 'late') { bg = 'bg-amber-900/40 border-amber-700/30 text-amber-400'; label = 'Đi muộn'; }
            if (rec.status === 'absent') { bg = 'bg-red-900/40 border-red-700/30 text-red-400'; label = 'Vắng'; }
            if (rec.status === 'half_day') { bg = 'bg-blue-900/40 border-blue-700/30 text-blue-400'; label = 'Nửa ngày'; }
          } else if (isWeekend) {
            bg = 'bg-surface-elevated/10 border-surface-border/20 text-slate-700';
            label = 'Cuối tuần';
          }

          return `${bg} ${isToday ? 'ring-2 ring-brand' : ''}`;
        };

        const getCellTime = (day) => {
          if (!day) return '';
          const [yr, mn] = month.split('-').map(Number);
          const dateStr = `${yr}-${String(mn).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          const rec = filteredRecords.find(t => t.work_date === dateStr);
          if (rec && rec.check_in_time) {
            return new Date(rec.check_in_time).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
          }
          return '';
        };

        const getStatusLabel = (day) => {
          if (!day) return '';
          const [yr, mn] = month.split('-').map(Number);
          const dateStr = `${yr}-${String(mn).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          const rec = filteredRecords.find(t => t.work_date === dateStr);
          return rec ? rec.status : '';
        };

        return (
          <div className="space-y-6 animate-fade-in">
            {/* Header controls */}
            <div className="flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <input type="month" value={month} onChange={e => setMonth(e.target.value)} className="input w-44 py-2" />
                {user.role !== 'employee' && (
                  <select value={selectedEmp} onChange={e => setSelectedEmp(e.target.value)} className="input w-56 py-2">
                    {employees.map(e => <option key={e.id} value={e.id}>{e.full_name}</option>)}
                  </select>
                )}
              </div>
              <div className="flex gap-2">
                <button onClick={() => setShowLeaveModal(true)} className="btn btn-secondary"><Icon name="Calendar" /> Đăng ký nghỉ</button>
                <button onClick={() => setShowCheckinModal(true)} className="btn btn-success"><Icon name="MapPin" /> Check-in GPS</button>
              </div>
            </div>

            {/* Stats row */}
            <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
              {[
                { label: 'Đúng giờ', val: summaryStats.present, color: 'text-emerald-400' },
                { label: 'Đi muộn', val: summaryStats.late, color: 'text-amber-400' },
                { label: 'Vắng mặt', val: summaryStats.absent, color: 'text-red-400' },
                { label: 'Giờ làm việc', val: `${summaryStats.totalHours}h`, color: 'text-blue-400' },
                { label: 'Tăng ca (OT)', val: `${summaryStats.otHours}h`, color: 'text-purple-400' }
              ].map((s, idx) => (
                <div key={idx} className="card p-4 text-center">
                  <p className={`text-2xl font-black ${s.color}`}>{s.val}</p>
                  <p className="text-xs text-slate-500 mt-1 font-medium">{s.label}</p>
                </div>
              ))}
            </div>

            {/* Calendar grid */}
            <div className="card p-6">
              <h3 className="font-bold text-white text-base mb-4 flex items-center gap-2"><Icon name="Calendar" className="text-brand" /> Bảng chấm công lịch</h3>
              <div className="grid grid-cols-7 gap-2 mb-2 text-center text-xs font-bold text-slate-500">
                {['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'].map(d => <div key={d}>{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-2">
                {calendarGrid.map((day, idx) => {
                  const status = getStatusLabel(day);
                  return (
                    <div key={idx} className={`rounded-xl border p-2 min-h-[64px] flex flex-col justify-between transition-all hover:scale-105 ${getCellStyles(day)}`}>
                      <span className="text-xs font-bold">{day || ''}</span>
                      <div className="text-[10px] text-center mt-1">
                        <span className="block font-bold">{getCellTime(day)}</span>
                        {status && <span className="block text-[8px] uppercase font-bold opacity-85">{status === 'present' ? 'OK' : status === 'late' ? 'Muộn' : 'Vắng'}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Timesheet List Table */}
            <div className="card p-6">
              <h3 className="font-bold text-white text-base mb-4 flex items-center gap-2"><Icon name="Clock" className="text-brand" /> Chi tiết chấm công</h3>
              <div className="table-wrapper">
                <table className="table">
                  <thead>
                    <tr>
                      <th>Ngày</th>
                      <th>Check-in</th>
                      <th>Check-out</th>
                      <th>Giờ công</th>
                      <th>Nguồn</th>
                      <th>Ghi chú</th>
                      <th>Trạng thái</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredRecords.length === 0 ? (
                      <tr>
                        <td colSpan="7" className="text-center text-slate-500 py-6">Chưa có dữ liệu chấm công cho tháng này</td>
                      </tr>
                    ) : (
                      filteredRecords.map(r => (
                        <tr key={r.id}>
                          <td className="font-mono text-xs">{r.work_date}</td>
                          <td className="text-emerald-400 font-mono text-sm">{r.check_in_time ? new Date(r.check_in_time).toLocaleTimeString('vi-VN') : '—'}</td>
                          <td className="text-slate-400 font-mono text-sm">{r.check_out_time ? new Date(r.check_out_time).toLocaleTimeString('vi-VN') : '—'}</td>
                          <td className="font-bold">{r.working_hours}h {r.ot_hours > 0 && <span className="text-purple-400 text-xs">+{r.ot_hours} OT</span>}</td>
                          <td className="capitalize text-xs text-slate-400">{r.source}</td>
                          <td className="text-xs text-slate-400 italic">"{r.note || ''}"</td>
                          <td>
                            <span className={`badge ${r.status === 'present' ? 'badge-success' : r.status === 'late' ? 'badge-warning' : 'badge-danger'}`}>
                              {r.status === 'present' ? 'Đúng giờ' : r.status === 'late' ? 'Đi muộn' : 'Vắng mặt'}
                            </span>
                          </td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>

            {/* MODALS */}
            {/* GPS check-in modal */}
            {showCheckinModal && (
              <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="glass-card w-full max-w-md p-6">
                  <div className="flex justify-between items-center mb-4">
                    <h4 className="font-bold text-white flex items-center gap-2"><Icon name="MapPin" className="text-brand" /> Chấm công GPS</h4>
                    <button onClick={() => setShowCheckinModal(false)} className="btn-ghost p-1 rounded-lg"><Icon name="X" /></button>
                  </div>
                  
                  <div className={`p-6 border rounded-xl text-center mb-4 ${checkinStatus === 'locating' ? 'bg-indigo-950/20 border-brand/30' : checkinStatus === 'success' ? 'bg-emerald-950/20 border-emerald-700/30' : 'bg-surface-elevated/40 border-surface-border'}`}>
                    {checkinStatus === 'locating' && (
                      <div className="space-y-3">
                        <Icon name="Loader2" size={32} className="animate-spin text-brand mx-auto" />
                        <p className="text-sm font-semibold text-brand-light">Đang lấy tọa độ GPS...</p>
                      </div>
                    )}
                    {checkinStatus === 'idle' && (
                      <div className="space-y-2">
                        <Icon name="MapPin" size={32} className="text-brand mx-auto" />
                        <p className="text-sm font-semibold text-white">Yêu cầu quyền vị trí để check-in</p>
                        <p className="text-xs text-slate-500">Phạm vi định vị văn phòng: 500m</p>
                      </div>
                    )}
                    {checkinStatus === 'success' && (
                      <div className="space-y-2">
                        <Icon name="CheckCircle" size={32} className="text-emerald-400 mx-auto" />
                        <p className="text-sm font-bold text-emerald-400">Check-in thành công!</p>
                        <p className="text-xs text-slate-400">Vị trí: 10.7769, 106.7009 (Văn phòng Quận 1)</p>
                      </div>
                    )}
                  </div>

                  <div className="mb-4">
                    <label className="label">Ghi chú công việc (nếu có)</label>
                    <input type="text" value={checkinNote} onChange={e => setCheckinNote(e.target.value)} className="input" placeholder="Ghi chú ca làm..." />
                  </div>

                  <div className="flex gap-3">
                    <button onClick={() => setShowCheckinModal(false)} className="btn btn-secondary flex-1 justify-center">Hủy</button>
                    <button onClick={handleGPSCheckin} disabled={checkinLoading || checkinStatus === 'success'} className="btn btn-success flex-1 justify-center">
                      Xác nhận
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Leave Request modal */}
            {showLeaveModal && (
              <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="glass-card w-full max-w-md p-6">
                  <div className="flex justify-between items-center mb-4">
                    <h4 className="font-bold text-white flex items-center gap-2"><Icon name="Calendar" className="text-brand" /> Xin nghỉ phép</h4>
                    <button onClick={() => setShowLeaveModal(false)} className="btn-ghost p-1 rounded-lg"><Icon name="X" /></button>
                  </div>

                  {leaveSuccess ? (
                    <div className="text-center py-6">
                      <Icon name="CheckCircle" size={48} className="text-emerald-400 mx-auto mb-3" />
                      <p className="text-emerald-400 font-bold">Đơn xin nghỉ phép đã gửi!</p>
                      <p className="text-xs text-slate-500 mt-1">Đang chờ trưởng bộ phận của bạn phê duyệt</p>
                    </div>
                  ) : (
                    <form onSubmit={handleLeaveSubmit} className="space-y-4">
                      <div>
                        <label className="label">Loại phép nghỉ</label>
                        <select value={leaveForm.leave_type} onChange={e => setLeaveForm({...leaveForm, leave_type: e.target.value})} className="input">
                          <option>Nghỉ phép năm</option>
                          <option>Nghỉ ốm đau</option>
                          <option>Nghỉ việc riêng (không lương)</option>
                          <option>Nghỉ chế độ</option>
                        </select>
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="label">Từ ngày</label>
                          <input type="date" value={leaveForm.start_date} onChange={e => setLeaveForm({...leaveForm, start_date: e.target.value})} className="input" required />
                        </div>
                        <div>
                          <label className="label">Đến ngày</label>
                          <input type="date" value={leaveForm.end_date} onChange={e => setLeaveForm({...leaveForm, end_date: e.target.value})} className="input" required />
                        </div>
                      </div>
                      <div>
                        <label className="label">Lý do xin nghỉ</label>
                        <textarea value={leaveForm.reason} onChange={e => setLeaveForm({...leaveForm, reason: e.target.value})} className="input h-20 resize-none" placeholder="Lý do chi tiết..." required></textarea>
                      </div>
                      <div className="flex gap-3 pt-2">
                        <button type="button" onClick={() => setShowLeaveModal(false)} className="btn btn-secondary flex-1 justify-center">Hủy</button>
                        <button type="submit" className="btn btn-primary flex-1 justify-center">Gửi đơn duyệt</button>
                      </div>
                    </form>
                  )}
                </div>
              </div>
            )}
          </div>

            id: `emp-00${employees.length + 1}`,

            ...form,

          };

                <button onClick={() => setViewTab('tree')} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${viewTab === 'tree' ? 'bg-brand text-white' : 'text-slate-400 hover:text-slate-200'}`}>Sơ đồ cây</button>

            {/* View List */}
            {viewTab === 'list' && (
              <div className="card p-6">
                <h3 className="font-bold text-white text-base mb-4 flex items-center gap-2"><Icon name="Users" className="text-brand" /> Hồ sơ nhân viên công ty</h3>
                <div className="table-wrapper">
